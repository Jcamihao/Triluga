services:
  - type: web
    name: triluga-api
    runtime: node
    plan: free
    region: virginia
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod:prepared
    healthCheckPath: /api/v1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: triluga-db
          property: connectionString
      - key: PLATFORM_FEE_RATE
        value: "0.12"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_COOKIE_NAME
        value: triluga_refresh_token
      - key: JWT_REFRESH_COOKIE_SECURE
        value: "true"
      - key: JWT_REFRESH_COOKIE_SAME_SITE
        value: none
      - key: PRIVACY_POLICY_VERSION
        value: "2026-03-27"
      - key: PRIVACY_CONTACT_EMAIL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        sync: false
      - key: MINIO_USE_SSL
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: triluga-public
      - key: MINIO_PRIVATE_BUCKET
        value: triluga-private
      - key: MINIO_PRIVATE_URL_EXPIRES_IN_SECONDS
        value: "600"
      - key: MINIO_PUBLIC_URL
        sync: false
  - type: web
    name: triluga-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist/frontend
    headers:
      - path: /assets/app-config.js
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_EXTERNAL_URL
        fromService:
          type: web
          name: triluga-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_CLIENT_LOGGING_ENABLED
        value: "true"

databases:
  - name: triluga-db
    plan: free
    region: virginia
    databaseName: triluga
    user: triluga
