<article
  class="group bg-surface-container-lowest rounded-2xl overflow-hidden hover:shadow-[0_32px_48px_-12px_rgba(9,29,46,0.12)] transition-all duration-500 flex flex-col h-full border border-outline-variant/10"
  [routerLink]="['/vehicles', vehicle.id]"
  tabindex="0"
  role="link"
>
  <div class="relative aspect-[4/3] overflow-hidden flex-shrink-0">
    <img
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
      [src]="vehicle.coverImage || fallbackImage"
      [alt]="vehicle.title"
      loading="lazy"
    />

    <!-- Top Left Badges -->
    <div class="absolute top-4 left-4 flex flex-col gap-2 z-10">
      <span
        class="bg-primary text-on-primary text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-md"
      >
        {{ badgeLabel() }}
      </span>
      <span
        class="bg-white text-primary text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full flex items-center gap-1 shadow-md"
        *ngIf="
          vehicle.owner?.ratingAverage && vehicle.owner!.ratingAverage! > 4.7
        "
      >
        <span class="material-symbols-outlined text-[12px]">verified</span>
        Certificado
      </span>
    </div>

    <!-- Actions (Compare & Favorite) -->
    <div class="absolute top-4 right-4 flex flex-col gap-2 z-10">
      <button
        type="button"
        class="w-10 h-10 bg-white shadow-lg rounded-full flex items-center justify-center transition-all active:scale-90 hover:bg-surface-container-high"
        [class.text-error]="isFavorite"
        [class.text-on-surface-variant]="!isFavorite"
        [disabled]="isFavoritePending"
        (click)="toggleFavorite($event)"
      >
        <span
          class="material-symbols-outlined text-[20px]"
          [style.font-variation-settings]="
            isFavorite ? '\'FILL\' 1' : '\'FILL\' 0'
          "
        >
          {{ isFavorite ? 'favorite' : 'favorite_border' }}
        </span>
      </button>

      <button
        type="button"
        class="w-10 h-10 bg-white shadow-lg rounded-full flex items-center justify-center transition-all active:scale-90 hover:bg-surface-container-high"
        [class.text-primary]="isCompared"
        [class.text-on-surface-variant]="!isCompared"
        [disabled]="compareDisabled && !isCompared"
        (click)="toggleCompare($event)"
      >
        <span
          class="material-symbols-outlined text-[20px]"
          [style.font-variation-settings]="
            isCompared ? '\'FILL\' 1' : '\'FILL\' 0'
          "
        >
          compare_arrows
        </span>
      </button>
    </div>
  </div>

  <div class="p-6 flex flex-col flex-grow">
    <div class="flex justify-between items-start mb-4">
      <div>
        <h3
          class="text-xl font-bold tracking-tight text-on-surface line-clamp-1"
        >
          {{ vehicle.title }}
        </h3>
        <div
          class="flex items-center gap-2 mt-1 text-on-surface-variant/70 text-[13px] font-medium flex-wrap"
        >
          <span>{{ vehicle.year }}</span>
          <span
            class="w-1 h-1 bg-outline-variant rounded-full opacity-40"
          ></span>
          <span>{{ transmissionLabel(vehicle.transmission) }}</span>
          <span
            class="w-1 h-1 bg-outline-variant rounded-full opacity-40"
          ></span>
          <span>{{ fuelTypeLabel(vehicle.fuelType) }}</span>
          <span
            class="w-1 h-1 bg-outline-variant rounded-full opacity-40"
          ></span>
          <span class="truncate">{{ vehicle.city }}, {{ vehicle.state }}</span>
        </div>
      </div>
    </div>

    <div class="flex-grow"></div>

    <div
      class="flex items-end justify-between pt-4 border-t border-outline-variant/10"
    >
      <div>
        <p
          class="text-[10px] font-bold text-outline uppercase tracking-wider mb-1"
        >
          A partir de
        </p>
        <span class="text-2xl font-black text-primary tracking-tighter">
          {{ vehicle.dailyRate | currency: 'BRL' : 'symbol' : '1.0-0' }}
          <span class="text-sm font-medium text-on-surface/50">/ dia</span>
        </span>
      </div>
      <button
        class="bg-surface-container-low p-3 rounded-full hover:bg-primary hover:text-on-primary transition-all duration-300"
        type="button"
      >
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </div>
</article>
