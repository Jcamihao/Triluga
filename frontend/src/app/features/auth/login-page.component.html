<main class="auth-page">
  <section class="auth-card">
    <a class="auth-back" routerLink="/">
      <span class="material-icons" aria-hidden="true">arrow_back</span>
      Voltar
    </a>

    <div class="auth-hero">
      <img class="auth-logo" src="assets/branding/triluga-logo.png" alt="Triluga" />
      <h1>Entre na sua conta</h1>
      <p>Acesse seu painel, converse com anunciantes e gerencie seus anúncios.</p>
    </div>

    <form class="auth-form" (ngSubmit)="login()">
      <label>
        <span>E-mail</span>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </label>

      <label>
        <span>Senha</span>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>

      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="auth-feedback" *ngIf="feedback" role="alert">
        <span class="material-icons" aria-hidden="true">error_outline</span>
        {{ feedback }}
      </div>

    </form>

    <div class="auth-links">
      <span>Não tem conta?</span>
      <a routerLink="/auth/register">Crie agora</a>
    </div>

    <div class="auth-links auth-links--muted">
      <a routerLink="/privacy">Política de privacidade</a>
    </div>
  </section>
</main>
